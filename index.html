    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      
      @media print {
        @page { size: landscape; margin: 0.5cm; }
        body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        /* Hide UI elements during print */
        header, .no-print, button, input[type="text"], input[type="number"], select, .map-section { display: none !important; }
        
        /* Force Expand Tables */
        .overflow-x-auto { overflow: visible !important; }
        table { width: 100% !important; border-collapse: collapse !important; }
        
        /* General Table Style */
        th, td { border: 1px solid #94a3b8 !important; padding: 4px !important; font-size: 8pt !important; }
        thead { background-color: #f1f5f9 !important; color: #0f172a !important; }
        
        /* Remove shadows and rounded corners for crisp print */
        .shadow-sm, .shadow-lg, .shadow-md, .shadow { box-shadow: none !important; }
        .rounded-xl, .rounded-lg, .rounded-md { border-radius: 0 !important; }
        .border { border: none !important; }
        
        /* Explicitly show the schedule container */
        .schedule-container { border: 1px solid #94a3b8 !important; margin-bottom: 20px; break-inside: avoid; page-break-inside: avoid; }
        .schedule-header { background: #e2e8f0 !important; border-bottom: 2px solid #64748b !important; font-weight: bold; padding: 10px; }
        
        /* Matrix specific print tweaks */
        td { height: auto !important; }
        .sticky { position: static !important; } 
      }
    </style>
